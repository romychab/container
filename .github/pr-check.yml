name: PR Check

on:
  pull_request:
    branches: [ main ]

concurrency:
  group: pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  detect-changes:
    name: Detect Changed Files
    runs-on: ubuntu-latest
    outputs:
      library-changed: ${{ steps.check.outputs.library-changed }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check if library sources changed
        id: check
        run: |
          if git diff --name-only ${{ github.event.pull_request.base.sha }} HEAD \
              | grep -qE '^container/|^gradle/|^build\.gradle\.kts$'; then
            echo "library-changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "library-changed=false" >> "$GITHUB_OUTPUT"
          fi

  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.library-changed == 'true'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@v4

      - name: Build and test library modules
        run: ./gradlew :container:build

      - name: Generate coverage report
        run: ./gradlew :container:koverXmlReport

      - name: Check coverage
        run: bash build-scripts/check-coverage.sh 80

      - name: Build demo app
        run: ./gradlew :app-demo:assembleDebug

  static-analysis:
    name: Static Analysis
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.library-changed == 'true'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@v4

      - name: Run Detekt
        run: ./gradlew detekt

  version-check:
    name: Version Bump Check
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.library-changed == 'true'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check VERSION_NAME was incremented
        run: bash build-scripts/check-version.sh
