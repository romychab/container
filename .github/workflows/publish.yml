name: Publish

on:
  push:
    branches: [ main ]
    paths:
      - 'container/**'
      - 'gradle/**'
      - 'build.gradle.kts'

concurrency:
  group: publish
  cancel-in-progress: false

jobs:
  publish:
    name: Stage to Maven Central
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@v4

      - name: Run tests and generate coverage report
        run: ./gradlew :container:koverXmlReport

      - name: Update coverage badge
        env:
          GIST_TOKEN: ${{ secrets.GIST_TOKEN }}
          GIST_ID: ${{ secrets.COVERAGE_GIST_ID }}
        run: bash build-scripts/update-coverage-badge.sh

      - name: Publish to Maven Central (staging)
        run: ./gradlew publishAllPublicationsToMavenCentralRepository
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyId: ${{ secrets.SIGNING_KEY_ID }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.SIGNING_KEY_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.SIGNING_KEY }}

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: publish
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Read version
        id: version
        run: |
          VERSION=$(grep '^VERSION_NAME=' gradle-public.properties | cut -d= -f2)
          echo "name=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Create tag and release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.name }}
          name: ${{ steps.version.outputs.name }}
          generate_release_notes: true
