site_name: Store
site_url: https://docs.uandcode.com/store/
site_description: A library for caching and observing data in Android applications
site_dir: build/mkdocs-store
docs_dir: build/mkdocs-store-src
repo_url: https://github.com/romychab/container
repo_name: GitHub
edit_uri: ""

theme:
  name: material
  features:
    - navigation.top
    - navigation.footer
    - content.code.copy
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

nav:
  - Home: index.md
  - Simple Store: simple-store.md
  - Keyed Store: keyed-store.md
  - Paged Store: paged-store.md
  - Store Results: store-results.md
  - Load Requests: load-requests.md

markdown_extensions:
  - admonition
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
